name: Daily regime trader

on:
  schedule:
    # Every calendar day (7/7) at 21:05 UTC (~4:05 PM ET). run_daily branches on market open vs closed.
    - cron: "5 21 * * *"
  workflow_dispatch:

concurrency:
  group: regime-trader-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: traderbot

    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Locate project directory
        run: |
          if [ -f regime-trader/run_daily.py ]; then
            echo "PROJECT_DIR=regime-trader" >> $GITHUB_ENV
          elif [ -f run_daily.py ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            echo "::error::Could not find run_daily.py — expected at repo root or regime-trader/"
            exit 1
          fi

      - name: Verify Actions secrets (names must match exactly)
        run: |
          ok=1
          check() {
            local name=$1
            local val=$2
            local required=$3
            if [ -z "$val" ]; then
              if [ "$required" = "required" ]; then
                echo "::error::${name} is empty. Go to Settings → Environments → traderbot → Environment secrets and add it. Name must match exactly."
                ok=0
              else
                echo "::warning::${name} is empty — optional but some features will be disabled."
              fi
            else
              echo "${name} ✅ (value hidden by GitHub)"
            fi
          }
          check "ALPACA_API_KEY"      "${ALPACA_API_KEY}"      required
          check "ALPACA_SECRET_KEY"   "${ALPACA_SECRET_KEY}"   required
          check "ALPACA_PAPER"        "${ALPACA_PAPER}"        required
          check "TELEGRAM_BOT_TOKEN"  "${TELEGRAM_BOT_TOKEN}"  required
          check "TELEGRAM_CHAT_ID"    "${TELEGRAM_CHAT_ID}"    required
          check "NEWSAPI_KEY"         "${NEWSAPI_KEY}"         required
          if [ "$ok" -eq 0 ]; then
            echo "If secrets live in an Environment, the job's \`environment:\` name must match that environment name exactly."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/requirements.txt

      - name: Restore HMM + portfolio state
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/hmm_model.pkl
            ${{ env.PROJECT_DIR }}/state_snapshot.json
          key: regime-${{ runner.os }}-${{ hashFiles('**/config/settings.yaml') }}
          restore-keys: |
            regime-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        working-directory: ${{ env.PROJECT_DIR }}
        run: python run_daily.py

      - name: Check files for cache save
        if: always()
        id: cache_files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f hmm_model.pkl ] || [ -f state_snapshot.json ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Save HMM + portfolio state
        if: always() && steps.cache_files.outputs.ok == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/hmm_model.pkl
            ${{ env.PROJECT_DIR }}/state_snapshot.json
          key: regime-${{ runner.os }}-${{ hashFiles('**/config/settings.yaml') }}
