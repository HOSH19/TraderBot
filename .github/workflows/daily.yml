# Daily run: Mon–Fri after US cash close (21:05 UTC ≈ 4:05 PM ET in standard time).
#
# Repository secrets: Settings → Secrets and variables → Actions → Repository secrets
# Environment secrets: Settings → Environments → <name> → Environment secrets — set `environment:` below to <name>

name: Daily regime trader

on:
  schedule:
    - cron: "5 21 * * 1-5"
  workflow_dispatch:

concurrency:
  group: regime-trader-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Must match the environment name where your secrets live (Settings → Environments).
    # If secrets are under "Repository secrets" only, you can remove this line.
    environment: production

    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Locate project directory
        run: |
          if [ -f regime-trader/run_daily.py ]; then
            echo "PROJECT_DIR=regime-trader" >> $GITHUB_ENV
          elif [ -f run_daily.py ]; then
            echo "PROJECT_DIR=." >> $GITHUB_ENV
          else
            echo "::error::Could not find run_daily.py — expected at repo root or regime-trader/"
            exit 1
          fi

      - name: Verify Actions secrets (names must match exactly)
        run: |
          ok=1
          if [ -z "${ALPACA_API_KEY}" ]; then
            echo "::error::ALPACA_API_KEY is empty. Add repository secrets under Actions, OR use Environment secrets and set \`environment:\` on this job to match Settings → Environments. Secret name must be exactly ALPACA_API_KEY."
            ok=0
          fi
          if [ -z "${ALPACA_SECRET_KEY}" ]; then
            echo "::error::ALPACA_SECRET_KEY is empty — same as above."
            ok=0
          fi
          if [ "$ok" -eq 0 ]; then
            echo "If secrets live in an Environment, the job's \`environment:\` name must match that environment (e.g. production)."
            exit 1
          fi
          echo "Alpaca secrets are non-empty (values hidden by GitHub)."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ${{ env.PROJECT_DIR }}/requirements.txt

      - name: Restore HMM + portfolio state
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/hmm_model.pkl
            ${{ env.PROJECT_DIR }}/state_snapshot.json
          key: regime-${{ runner.os }}-${{ hashFiles('**/config/settings.yaml') }}
          restore-keys: |
            regime-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        working-directory: ${{ env.PROJECT_DIR }}
        run: python run_daily.py

      - name: Check files for cache save
        if: always()
        id: cache_files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ -f hmm_model.pkl ] || [ -f state_snapshot.json ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Save HMM + portfolio state
        if: always() && steps.cache_files.outputs.ok == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.PROJECT_DIR }}/hmm_model.pkl
            ${{ env.PROJECT_DIR }}/state_snapshot.json
          key: regime-${{ runner.os }}-${{ hashFiles('**/config/settings.yaml') }}
